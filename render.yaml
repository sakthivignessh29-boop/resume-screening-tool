services:
  - type: web
    name: resume-screening-tool
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
    # Optional: Disks for persistence (SQLite & Uploads)
